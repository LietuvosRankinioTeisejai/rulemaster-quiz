<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankinio Taisyklių Testai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <h1 class="text-3xl font-bold mb-8">Rankinio Taisyklių Testai</h1>

    <div id="selection">
        <button onclick="startTest()" 
                class="bg-blue-700 hover:bg-blue-800 text-white px-8 py-3 rounded-xl text-lg">
            Pradėti testą
        </button>
    </div>

    <div id="quiz" class="hidden mt-8">
        <div id="question-text" class="text-2xl font-semibold mb-6"></div>
        <div id="options" class="space-y-3 mb-6"></div>
        <button onclick="nextQuestion()" 
                class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-xl">
            Kitas klausimas
        </button>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;

        async function loadQuestions() {
            const res = await fetch('questions.json');
            if (!res.ok) {
                alert("KLAIDA: Nepavyko užkrauti questions.json failo!");
                return;
            }
            questions = await res.json();
            console.log("Užkrauta klausimų:", questions.length);
        }

        async function startTest() {
            await loadQuestions();

            if (questions.length === 0) {
                alert("Klausimai neužsikrovė. Patikrink questions.json failą.");
                return;
            }

            document.getElementById('selection').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');

            currentIndex = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('question-text').innerText = q.text;

            const container = document.getElementById('options');
            container.innerHTML = '';

            q.options.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'block w-full text-left border p-4 rounded-xl hover:bg-blue-50';
                btn.innerText = option;
                btn.onclick = () => {
                    alert("Pasirinkai: " + option);
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                alert("Testas baigtas!");
            }
        }
    </script>
</body>
</html>
