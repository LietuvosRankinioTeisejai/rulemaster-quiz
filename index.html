<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankinio Taisyklių Testai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #quiz-screen {
            user-select: none;
            -webkit-user-select: none;
        }
        .handball-bg {
            background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-slate-100">
    <!-- Header -->
    <header class="handball-bg text-white">
        <div class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-futbol text-white text-4xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">Rankinio Taisyklių Testai</h1>
                    <p class="text-orange-400 text-sm">IHF 2025 • Lietuvos Rankinio Teisėjai</p>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-6 py-10">

        <!-- SELECTION SCREEN -->
        <div id="selection-screen">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-bold tracking-tight text-slate-900">Pasirinkite testą</h2>
                <p class="text-slate-600 mt-2 text-lg">Klausimai imami atsitiktinai iš oficialios IHF 2025 bazės</p>
            </div>

            <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                <!-- Trumpas -->
                <div onclick="startTest(15)" 
                     class="group bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer hover:border-orange-400 hover:shadow-xl transition-all">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-3xl font-bold text-slate-900">Trumpas</h3>
                            <p class="text-slate-500 mt-1">15 klausimų • 15 min</p>
                        </div>
                        <i class="fa-solid fa-bolt text-4xl text-orange-500 group-hover:scale-110 transition-transform"></i>
                    </div>
                    <button class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl transition-colors">
                        Pradėti testą
                    </button>
                </div>

                <!-- Standartinis -->
                <div onclick="startTest(20)" 
                     class="group bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer hover:border-orange-400 hover:shadow-xl transition-all">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-3xl font-bold text-slate-900">Standartinis</h3>
                            <p class="text-slate-500 mt-1">20 klausimų • 20 min</p>
                        </div>
                        <i class="fa-solid fa-balance-scale text-4xl text-orange-500 group-hover:scale-110 transition-transform"></i>
                    </div>
                    <button class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl transition-colors">
                        Pradėti testą
                    </button>
                </div>

                <!-- Ilgas -->
                <div onclick="startTest(30)" 
                     class="group bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer hover:border-orange-400 hover:shadow-xl transition-all">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-3xl font-bold text-slate-900">Ilgas</h3>
                            <p class="text-slate-500 mt-1">30 klausimų • 30 min</p>
                        </div>
                        <i class="fa-solid fa-tachometer-alt text-4xl text-orange-500 group-hover:scale-110 transition-transform"></i>
                    </div>
                    <button class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl transition-colors">
                        Pradėti testą
                    </button>
                </div>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden max-w-3xl mx-auto">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 py-5 bg-slate-900 text-white flex justify-between items-center">
                    <div>
                        <div id="quiz-name" class="font-semibold text-xl"></div>
                        <div id="quiz-info" class="text-sm text-slate-400"></div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-400">LIKĘS LAIKAS</div>
                        <div id="timer" class="text-4xl font-semibold tabular-nums">15:00</div>
                    </div>
                </div>

                <div class="p-8">
                    <div class="flex justify-between mb-4 text-sm">
                        <div id="progress-text" class="font-medium text-slate-600"></div>
                        <div id="question-counter" class="font-semibold"></div>
                    </div>
                    <div class="mb-6">
                        <h3 id="question-text" class="text-2xl font-semibold leading-tight"></h3>
                    </div>
                    <div id="options" class="space-y-3"></div>
                </div>

                <div class="px-8 py-5 bg-slate-50 border-t flex justify-between items-center">
                    <button onclick="cancelQuiz()" class="text-red-600 hover:text-red-700 font-medium flex items-center gap-x-2">
                        <i class="fa-solid fa-times"></i> Nutraukti
                    </button>
                    <div class="flex gap-x-3">
                        <button onclick="prevQuestion()" class="px-6 py-2.5 border border-slate-300 rounded-2xl hover:bg-slate-100">← Ankstesnis</button>
                        <button onclick="nextQuestion()" class="px-6 py-2.5 border border-slate-300 rounded-2xl hover:bg-slate-100">Kitas →</button>
                        <button onclick="finishQuiz()" class="px-8 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-2xl">Baigti testą</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden max-w-4xl mx-auto">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 pt-8 pb-6 text-center">
                    <div id="result-badge" class="inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold mb-4"></div>
                    <div class="text-6xl font-bold" id="score-text"></div>
                    <div class="text-2xl text-slate-500 mt-1" id="percentage-text"></div>
                </div>

                <div class="px-8 pb-8">
                    <h3 class="font-semibold text-lg mb-4">Teisingi atsakymai:</h3>
                    <div id="review-section" class="space-y-4 text-sm"></div>
                </div>

                <div class="p-8 flex gap-3 border-t">
                    <button onclick="window.print()" class="flex-1 px-6 py-3 bg-white border rounded-2xl font-medium">Spausdinti</button>
                    <button onclick="restartApp()" class="flex-1 px-6 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-2xl">Grįžti į testus</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === VISAS JAVASCRIPT KODAS LIEKA TAS PATS KAIP ANKSČIAU ===
        // (kopijuok iš ankstesnio atsakymo visą <script> dalį)
        
        let questionBank = [];
        let currentQuestions = [];
        let answers = [];
        let currentIndex = 0;
        let timerInterval = null;
        let timeLeft = 0;

        async function loadQuestions() {
            const res = await fetch('questions.json');
            if (!res.ok) throw new Error("Nepavyko įkelti questions.json");
            questionBank = await res.json();
        }

        function shuffleArray(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function cleanQuestionText(text) {
            return text.replace(/^\d+\.\d+\)\s*/, '');
        }

        function cleanOptionText(text) {
            return text.replace(/^[a-z]\)\s*/i, '');
        }

        async function startTest(numQuestions) {
            if (questionBank.length === 0) {
                await loadQuestions();
            }

            const selected = shuffleArray(questionBank).slice(0, numQuestions);

            currentQuestions = selected.map(q => {
                let optionsWithIndex = q.options.map((text, idx) => ({
                    text: cleanOptionText(text),
                    originalIndex: idx
                }));
                return {
                    ...q,
                    shuffledOptions: shuffleArray(optionsWithIndex)
                };
            });

            answers = new Array(currentQuestions.length).fill(null);
            currentIndex = 0;
            timeLeft = numQuestions * 60;

            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('results-screen').classList.add('hidden');

            document.getElementById('quiz-name').textContent = `${numQuestions} klausimų testas`;
            document.getElementById('quiz-info').textContent = `${currentQuestions.length} klausimų • ${numQuestions} min`;

            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishQuiz(true);
                }
            }, 1000);
        }

        function updateTimer() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').textContent = cleanQuestionText(q.text);
            document.getElementById('question-counter').textContent = `Klausimas ${currentIndex + 1} iš ${currentQuestions.length}`;

            const answeredCount = answers.filter(a => a && a.length > 0).length;
            document.getElementById('progress-text').textContent = `${answeredCount} iš ${currentQuestions.length} atsakyta`;

            const container = document.getElementById('options');
            container.innerHTML = '';

            q.shuffledOptions.forEach((opt) => {
                const isSelected = answers[currentIndex] && answers[currentIndex].includes(opt.originalIndex);
                const div = document.createElement('div');
                div.className = `option border border-slate-200 rounded-2xl px-6 py-4 flex items-center gap-x-4 cursor-pointer ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" class="w-5 h-5 accent-blue-700 pointer-events-none" ${isSelected ? 'checked' : ''}>
                    <div class="flex-1">${opt.text}</div>
                `;
                div.onclick = () => {
                    if (!answers[currentIndex]) answers[currentIndex] = [];
                    const idx = answers[currentIndex].indexOf(opt.originalIndex);
                    if (idx > -1) answers[currentIndex].splice(idx, 1);
                    else answers[currentIndex].push(opt.originalIndex);
                    renderQuestion();
                };
                container.appendChild(div);
            });
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function finishQuiz(timeExpired = false) {
            clearInterval(timerInterval);

            let correctCount = 0;
            let reviewHTML = '';

            currentQuestions.forEach((q, i) => {
                const userAns = answers[i] || [];
                const isCorrect = userAns.length === q.correct.length && userAns.every(ans => q.correct.includes(ans));

                if (isCorrect) correctCount++;

                const userText = userAns.length > 0 ? userAns.map(idx => q.options[idx]).join(", ") : "Neatsakyta";
                const correctText = q.correct.map(idx => q.options[idx]).join(", ");

                reviewHTML += `
                    <div class="border rounded-2xl p-4 ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}">
                        <div class="font-medium mb-2">${cleanQuestionText(q.text)}</div>
                        <div class="text-sm">
                            <span class="font-semibold">Tavo atsakymas:</span> ${userText}<br>
                            <span class="font-semibold">Teisingas atsakymas:</span> <span class="text-emerald-700">${correctText}</span>
                        </div>
                    </div>
                `;
            });

            const percent = Math.round((correctCount / currentQuestions.length) * 100);

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            document.getElementById('score-text').innerHTML = `${correctCount} <span class="text-4xl text-slate-400">/ ${currentQuestions.length}</span>`;
            document.getElementById('percentage-text').textContent = `${percent}%`;

            const badge = document.getElementById('result-badge');
            if (timeExpired) {
                badge.innerHTML = `<i class="fa-solid fa-clock mr-2"></i> LAIKAS PASIBAIGĖ`;
                badge.className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-orange-100 text-orange-700";
            } else if (percent >= 75) {
                badge.innerHTML = `<i class="fa-solid fa-check-circle mr-2"></i> IŠLAIKYTA`;
                badge.className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-emerald-100 text-emerald-700";
            } else {
                badge.innerHTML = `<i class="fa-solid fa-times-circle mr-2"></i> NEIŠLAIKYTA`;
                badge.className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-red-100 text-red-700";
            }

            document.getElementById('review-section').innerHTML = reviewHTML;
        }

        function cancelQuiz() {
            if (confirm("Ar tikrai norite nutraukti šį testą?")) {
                clearInterval(timerInterval);
                restartApp();
            }
        }

        function restartApp() {
            document.getElementById('selection-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            clearInterval(timerInterval);
        }

        function blockCopy() {
            const screen = document.getElementById('quiz-screen');
            if (screen) {
                screen.addEventListener('copy', e => e.preventDefault());
                screen.addEventListener('cut', e => e.preventDefault());
            }
        }

        window.onload = async function () {
            try {
                await loadQuestions();
                console.log("Klausimai įkelti:", questionBank.length);
                blockCopy();
            } catch (error) {
                alert("Klaida įkeliant klausimus.");
            }
        };
    </script>
</body>
</html>
