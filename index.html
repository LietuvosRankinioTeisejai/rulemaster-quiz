<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankinio Taisyklių Testai • IHF 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
    <!-- Header -->
    <header class="bg-white border-b">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-blue-700 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-gavel text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Rankinio Taisyklių Testai</h1>
                    <p class="text-xs text-slate-500 -mt-1">Oficialus IHF klausimynas • 2025</p>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-10" id="app">
        <!-- Čia bus rodoma atranka, testas ir rezultatai -->
        <div id="selection-screen">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-semibold tracking-tight text-slate-900">Pasirinkite testą</h2>
            </div>
            <div class="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                <!-- Trumpas, Standartinis, Ilgas mygtukai -->
                <div onclick="startTest('short')" class="bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer">
                    <h3 class="text-3xl font-semibold">Trumpas testas</h3>
                    <p class="mt-2">15 klausimų • 15 min</p>
                    <button class="mt-6 w-full bg-blue-700 text-white py-3 rounded-2xl">Pradėti</button>
                </div>
                <!-- Panašiai kiti du -->
            </div>
        </div>

        <!-- Quiz ir Results ekranai bus pridėti vėliau -->
    </div>

    <script>
        let questionBank = [];

        async function loadQuestions() {
            const res = await fetch('questions.json');
            questionBank = await res.json();
        }

        async function startTest(type) {
            await loadQuestions(); // užkrauna klausimus
            // ... likusi logika
            alert("Klausimai sėkmingai užkrauti! (tolimesnė logika bus pridėta)");
        }

        // Likusią logiką (renderQuestion, finishQuiz ir t.t.) galiu atsiųsti, kai patvirtinsi, kad questions.json veikia.
    </script>
</body>
</html>
