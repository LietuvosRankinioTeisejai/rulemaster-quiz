<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankinio Taisyklių Testai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #quiz-screen { user-select: none; -webkit-user-select: none; }
        .nav-button { min-height: 52px; font-size: 15px; }
    </style>
</head>
<body class="bg-slate-100">

    <header class="bg-slate-900 text-white">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-futbol text-white text-3xl"></i>
                </div>
                <div>
                    <h1 id="app-title" class="text-2xl font-bold">Rankinio Taisyklių Testai</h1>
                    <p id="app-subtitle" class="text-orange-400 text-sm">IHF 2025</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <label id="language-label" for="language-select" class="text-sm text-slate-300">Kalba</label>
                <select id="language-select" onchange="changeLanguage(this.value)" class="bg-slate-800 border border-slate-700 text-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <option value="lt">Lietuvių</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-6 py-10">

        <!-- SELECTION SCREEN -->
        <div id="selection-screen">
            <div class="text-center mb-8">
                <h2 id="selection-title" class="text-4xl font-bold text-slate-900">Pasirinkite testą</h2>
                <p id="selection-description" class="text-slate-600 mt-3 max-w-2xl mx-auto">
                    Testai sudaryti iš IHF 2025 liepos 1 d. patvirtinto klausimyno
                </p>
            </div>

            <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                <div onclick="startTest(15)" class="bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer hover:border-orange-400 hover:shadow-xl transition-all">
                    <h3 id="short-test-title" class="text-3xl font-bold">Trumpas testas</h3>
                    <p id="short-test-meta" class="text-slate-500 mt-1">15 klausimų • 15 min</p>
                    <button id="short-start-button" class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl">Pradėti</button>
                </div>

                <div onclick="startTest(20)" class="bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer hover:border-orange-400 hover:shadow-xl transition-all">
                    <h3 id="standard-test-title" class="text-3xl font-bold">Standartinis testas</h3>
                    <p id="standard-test-meta" class="text-slate-500 mt-1">20 klausimų • 20 min</p>
                    <button id="standard-start-button" class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl">Pradėti</button>
                </div>

                <div onclick="startTest(30)" class="bg-white border border-slate-200 rounded-3xl p-8 cursor-pointer hover:border-orange-400 hover:shadow-xl transition-all">
                    <h3 id="long-test-title" class="text-3xl font-bold">Ilgas testas</h3>
                    <p id="long-test-meta" class="text-slate-500 mt-1">30 klausimų • 30 min</p>
                    <button id="long-start-button" class="mt-8 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3.5 rounded-2xl">Pradėti</button>
                </div>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden max-w-3xl mx-auto">
            <div class="bg-white rounded-3xl shadow border border-slate-200 overflow-hidden">
                
                <div class="px-8 py-5 bg-slate-900 text-white flex justify-between items-center">
                    <div>
                        <div id="quiz-name" class="font-semibold text-xl"></div>
                        <div id="quiz-info" class="text-sm text-slate-400"></div>
                    </div>
                    <div class="text-right">
                        <div id="timer-label" class="text-xs text-slate-400">LIKĘS LAIKAS</div>
                        <div id="timer" class="text-4xl font-bold tabular-nums">15:00</div>
                    </div>
                </div>

                <div id="warning-banner" class="hidden bg-yellow-100 border-b border-yellow-300 px-6 py-3 text-yellow-800 text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-exclamation-triangle"></i>
                    <span id="warning-text"></span>
                </div>

                <div class="p-8">
                    <div class="flex justify-between mb-4 text-sm">
                        <div id="progress-text" class="font-medium text-slate-600"></div>
                        <div id="question-counter" class="font-semibold"></div>
                    </div>
                    <div class="mb-6">
                        <h3 id="question-text" class="text-2xl font-semibold"></h3>
                    </div>
                    <div id="options" class="space-y-3"></div>
                </div>

                <!-- Navigation -->
                <div class="px-4 py-5 bg-slate-50 border-t">
                    <div class="flex flex-col gap-3">
                        <div class="grid grid-cols-2 gap-3">
                            <button id="prev-button" onclick="prevQuestion()" class="nav-button px-6 py-3.5 border border-slate-300 rounded-2xl font-medium active:bg-slate-100">← Ankstesnis</button>
                            <button id="next-button" onclick="nextQuestion()" class="nav-button px-6 py-3.5 border border-slate-300 rounded-2xl font-medium active:bg-slate-100">Kitas →</button>
                        </div>
                        <button id="finish-early-button" onclick="confirmFinish()" class="w-full px-6 py-3.5 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-2xl">Baigti testą anksčiau</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden max-w-4xl mx-auto">
            <div class="bg-white rounded-3xl shadow border border-slate-200 overflow-hidden">
                <div class="px-8 pt-8 pb-6 text-center">
                    <div id="result-badge" class="inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold mb-4"></div>
                    <div class="text-6xl font-bold" id="score-text"></div>
                    <div class="text-2xl text-slate-500 mt-1" id="percentage-text"></div>
                </div>

                <div class="px-8 pb-8">
                    <h3 id="results-title" class="font-semibold text-lg mb-4">Testo rezultatai</h3>
                    <div id="review-section" class="space-y-4 text-sm"></div>
                </div>

                <div class="p-8 flex gap-3 border-t">
                    <button id="restart-button" onclick="restartApp()" class="flex-1 px-6 py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-2xl">Grįžti į testus</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const QUESTION_FILES = {
            lt: './questions-lt.json',
            en: './questions-en.json'
        };

        const translations = {
            lt: {
                pageTitle: 'Rankinio Taisyklių Testai',
                appTitle: 'Rankinio Taisyklių Testai',
                appSubtitle: 'IHF 2025',
                languageLabel: 'Kalba',
                selectionTitle: 'Pasirinkite testą',
                selectionDescription: 'Testai sudaryti iš IHF 2025 liepos 1 d. patvirtinto klausimyno',
                shortTestTitle: 'Trumpas testas',
                shortTestMeta: '15 klausimų • 15 min',
                standardTestTitle: 'Standartinis testas',
                standardTestMeta: '20 klausimų • 20 min',
                longTestTitle: 'Ilgas testas',
                longTestMeta: '30 klausimų • 30 min',
                startButton: 'Pradėti',
                timerLabel: 'LIKĘS LAIKAS',
                prevButton: '← Ankstesnis',
                nextButton: 'Kitas →',
                finishEarlyButton: 'Baigti testą anksčiau',
                resultsTitle: 'Testo rezultatai',
                restartButton: 'Grįžti į testus',
                quizName: '{count} klausimų testas',
                quizInfo: '{count} klausimų • {minutes} min',
                questionCounter: 'Klausimas {current} iš {total}',
                progressText: '{answered} iš {total} atsakyta',
                loadErrorAlert: 'Klaida: Nepavyko įkelti {file} failo.',
                loadErrorGeneric: 'Klaida įkeliant klausimus.',
                fileMissingError: '{file} nerastas',
                warningCheat: 'Nesukčiauk 😂 Perjungėte langą! Tau liko viena gyvybė. 👀',
                testTerminatedBadge: 'TESTAS NUTRAUKTAS',
                testTerminated: 'Testas nutrauktas',
                testTerminatedMessage: 'Testas buvo nutrauktas.',
                secondSwitchMessage: 'Perjungėte langą antrą kartą.',
                confirmFinish: 'Ar tikrai nori baigti testą anksčiau?',
                confirmCancel: 'Ar tikrai norite nutraukti testą?',
                changeLanguageConfirm: 'Pakeitus kalbą dabartinis testas bus nutrauktas. Tęsti?',
                unanswered: 'Neatsakyta',
                yourAnswer: 'Tavo atsakymas:',
                correctAnswer: 'Teisingas atsakymas:',
                timeExpiredBadge: 'LAIKAS PASIBAIGĖ',
                passedBadge: 'IŠLAIKYTA',
                failedBadge: 'NEIŠLAIKYTA',
                questionsLoadedLog: 'Klausimai įkelti:'
            },
            en: {
                pageTitle: 'Handball Rules Tests',
                appTitle: 'Handball Rules Tests',
                appSubtitle: 'IHF 2025',
                languageLabel: 'Language',
                selectionTitle: 'Choose a test',
                selectionDescription: 'Tests are based on the questionnaire approved by the IHF on 1 July 2025',
                shortTestTitle: 'Short test',
                shortTestMeta: '15 questions • 15 min',
                standardTestTitle: 'Standard test',
                standardTestMeta: '20 questions • 20 min',
                longTestTitle: 'Long test',
                longTestMeta: '30 questions • 30 min',
                startButton: 'Start',
                timerLabel: 'TIME LEFT',
                prevButton: '← Previous',
                nextButton: 'Next →',
                finishEarlyButton: 'Finish test early',
                resultsTitle: 'Test results',
                restartButton: 'Back to tests',
                quizName: '{count}-question test',
                quizInfo: '{count} questions • {minutes} min',
                questionCounter: 'Question {current} of {total}',
                progressText: '{answered} of {total} answered',
                loadErrorAlert: 'Error: Could not load the {file} file.',
                loadErrorGeneric: 'Error loading questions.',
                fileMissingError: '{file} not found',
                warningCheat: 'No cheating 😂 You switched windows! You have one life left. 👀',
                testTerminatedBadge: 'TEST TERMINATED',
                testTerminated: 'Test terminated',
                testTerminatedMessage: 'The test was terminated.',
                secondSwitchMessage: 'You switched windows for the second time.',
                confirmFinish: 'Are you sure you want to finish the test early?',
                confirmCancel: 'Are you sure you want to cancel the test?',
                changeLanguageConfirm: 'Changing the language will cancel the current test. Continue?',
                unanswered: 'Unanswered',
                yourAnswer: 'Your answer:',
                correctAnswer: 'Correct answer:',
                timeExpiredBadge: 'TIME EXPIRED',
                passedBadge: 'PASSED',
                failedBadge: 'FAILED',
                questionsLoadedLog: 'Questions loaded:'
            }
        };

        let currentLang = localStorage.getItem('quizLanguage') || 'lt';
        if (!QUESTION_FILES[currentLang]) currentLang = 'lt';

        let questionBank = [];
        let currentQuestions = [];
        let answers = [];
        let currentIndex = 0;
        let timerInterval = null;
        let timeLeft = 0;
        let testTerminated = false;
        let hiddenTimestamp = null;
        let lives = 1;

        function t(key, replacements = {}) {
            let value = (translations[currentLang] && translations[currentLang][key]) || translations.lt[key] || key;
            Object.entries(replacements).forEach(([name, replacement]) => {
                value = value.replaceAll(`{${name}}`, replacement);
            });
            return value;
        }

        function setText(id, key) {
            const element = document.getElementById(id);
            if (element) element.textContent = t(key);
        }

        function applyTranslations() {
            document.documentElement.lang = currentLang;
            document.title = t('pageTitle');
            const languageSelect = document.getElementById('language-select');
            if (languageSelect) languageSelect.value = currentLang;

            setText('app-title', 'appTitle');
            setText('app-subtitle', 'appSubtitle');
            setText('language-label', 'languageLabel');
            setText('selection-title', 'selectionTitle');
            setText('selection-description', 'selectionDescription');
            setText('short-test-title', 'shortTestTitle');
            setText('short-test-meta', 'shortTestMeta');
            setText('standard-test-title', 'standardTestTitle');
            setText('standard-test-meta', 'standardTestMeta');
            setText('long-test-title', 'longTestTitle');
            setText('long-test-meta', 'longTestMeta');
            setText('short-start-button', 'startButton');
            setText('standard-start-button', 'startButton');
            setText('long-start-button', 'startButton');
            setText('timer-label', 'timerLabel');
            setText('prev-button', 'prevButton');
            setText('next-button', 'nextButton');
            setText('finish-early-button', 'finishEarlyButton');
            setText('results-title', 'resultsTitle');
            setText('restart-button', 'restartButton');

            if (currentQuestions.length > 0 && !document.getElementById('quiz-screen').classList.contains('hidden')) {
                renderQuestion();
            }
        }

        async function loadQuestions() {
            const file = QUESTION_FILES[currentLang];
            const res = await fetch(file, { cache: 'no-store' });
            if (!res.ok) {
                alert(t('loadErrorAlert', { file }));
                throw new Error(t('fileMissingError', { file }));
            }
            questionBank = await res.json();
        }

        async function changeLanguage(lang) {
            if (!QUESTION_FILES[lang] || lang === currentLang) return;

            const quizIsRunning = !document.getElementById('quiz-screen').classList.contains('hidden');
            if (quizIsRunning && !confirm(t('changeLanguageConfirm'))) {
                document.getElementById('language-select').value = currentLang;
                return;
            }

            currentLang = lang;
            localStorage.setItem('quizLanguage', currentLang);
            questionBank = [];
            currentQuestions = [];
            answers = [];
            currentIndex = 0;
            clearInterval(timerInterval);
            testTerminated = false;
            hiddenTimestamp = null;
            lives = 1;

            applyTranslations();
            restartApp();

            try {
                await loadQuestions();
                console.log(t('questionsLoadedLog'), questionBank.length);
            } catch (error) {
                alert(t('loadErrorGeneric'));
            }
        }

        function shuffleArray(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function cleanQuestionText(text) {
            return String(text || '').replace(/^\d+\.\d+\)\s*/, '');
        }

        function cleanOptionText(text) {
            return String(text || '').replace(/^[a-z]\)\s*/i, '');
        }

        function getRuleNumber(question) {
            const match = String(question.text || '').match(/^\s*(\d+)\.\d+\)/);
            return match ? match[1] : null;
        }

        function selectQuestionsForTest(numQuestions) {
            const shuffledBank = shuffleArray(questionBank);

            if (numQuestions !== 30) {
                return shuffledBank.slice(0, numQuestions);
            }

            const requiredDifferentRules = Math.min(18, numQuestions);
            const questionsByRule = new Map();

            shuffledBank.forEach(question => {
                const ruleNumber = getRuleNumber(question);
                if (!ruleNumber) return;
                if (!questionsByRule.has(ruleNumber)) {
                    questionsByRule.set(ruleNumber, []);
                }
                questionsByRule.get(ruleNumber).push(question);
            });

            const selected = [];
            const selectedSet = new Set();
            const ruleNumbers = shuffleArray([...questionsByRule.keys()]);

            ruleNumbers.slice(0, requiredDifferentRules).forEach(ruleNumber => {
                const questions = questionsByRule.get(ruleNumber);
                if (questions && questions.length > 0) {
                    const question = questions.shift();
                    selected.push(question);
                    selectedSet.add(question);
                }
            });

            const remainingQuestions = shuffledBank.filter(question => !selectedSet.has(question));
            selected.push(...remainingQuestions.slice(0, numQuestions - selected.length));

            return shuffleArray(selected);
        }

        async function startTest(numQuestions) {
            if (questionBank.length === 0) {
                await loadQuestions();
            }

            const selected = selectQuestionsForTest(numQuestions);

            currentQuestions = selected.map(q => {
                let optionsWithIndex = q.options.map((text, idx) => ({
                    text: cleanOptionText(text),
                    originalIndex: idx
                }));
                return {
                    ...q,
                    shuffledOptions: shuffleArray(optionsWithIndex)
                };
            });

            answers = Array.from({ length: currentQuestions.length }, () => []);
            currentIndex = 0;
            timeLeft = numQuestions * 60;
            testTerminated = false;
            hiddenTimestamp = null;
            lives = 1;

            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('warning-banner').classList.add('hidden');

            document.getElementById('quiz-name').textContent = t('quizName', { count: numQuestions });
            document.getElementById('quiz-info').textContent = t('quizInfo', { count: currentQuestions.length, minutes: numQuestions });

            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishQuiz(true);
                }
            }, 1000);
        }

        function updateTimer() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('question-text').textContent = cleanQuestionText(q.text);
            document.getElementById('question-counter').textContent = t('questionCounter', {
                current: currentIndex + 1,
                total: currentQuestions.length
            });

            const answeredCount = answers.filter(a => a && a.length > 0).length;
            document.getElementById('progress-text').textContent = t('progressText', {
                answered: answeredCount,
                total: currentQuestions.length
            });

            const container = document.getElementById('options');
            container.innerHTML = '';

            q.shuffledOptions.forEach((opt) => {
                const isSelected = answers[currentIndex] && answers[currentIndex].includes(opt.originalIndex);
                const div = document.createElement('div');
                div.className = `option border border-slate-200 rounded-2xl px-6 py-4 flex items-center gap-x-4 cursor-pointer ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" class="w-5 h-5 accent-blue-700 pointer-events-none" ${isSelected ? 'checked' : ''}>
                    <div class="flex-1">${opt.text}</div>
                `;
                div.onclick = () => {
                    if (!answers[currentIndex]) answers[currentIndex] = [];
                    const idx = answers[currentIndex].indexOf(opt.originalIndex);
                    if (idx > -1) answers[currentIndex].splice(idx, 1);
                    else answers[currentIndex].push(opt.originalIndex);
                    renderQuestion();
                };
                container.appendChild(div);
            });
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function enableAntiCheat() {
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }

        function handleVisibilityChange() {
            if (testTerminated || document.getElementById('quiz-screen').classList.contains('hidden')) return;

            if (document.hidden) {
                hiddenTimestamp = Date.now();
            } else if (hiddenTimestamp) {
                const timeAway = Date.now() - hiddenTimestamp;
                if (timeAway > 4000) {
                    if (lives > 0) {
                        showWarning();
                        lives = 0;
                    } else {
                        terminateTest();
                    }
                }
                hiddenTimestamp = null;
            }
        }

        function showWarning() {
            const banner = document.getElementById('warning-banner');
            const text = document.getElementById('warning-text');
            text.innerHTML = t('warningCheat');
            banner.classList.remove('hidden');
            setTimeout(() => banner.classList.add('hidden'), 6000);
        }

        function terminateTest() {
            if (testTerminated) return;
            testTerminated = true;
            clearInterval(timerInterval);

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            document.getElementById('result-badge').innerHTML = `<i class="fa-solid fa-exclamation-triangle mr-2"></i> ${t('testTerminatedBadge')}`;
            document.getElementById('result-badge').className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-red-100 text-red-700";
            document.getElementById('score-text').innerHTML = `0`;
            document.getElementById('percentage-text').textContent = t('testTerminated');
            document.getElementById('review-section').innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
                    <p class="text-red-700 font-semibold text-lg">${t('testTerminatedMessage')}</p>
                    <p class="text-red-600 mt-2">${t('secondSwitchMessage')}</p>
                </div>
            `;
        }

        function confirmFinish() {
            if (confirm(t('confirmFinish'))) {
                finishQuiz();
            }
        }

        function finishQuiz(timeExpired = false) {
            if (testTerminated) return;

            clearInterval(timerInterval);

            let correctCount = 0;
            let reviewHTML = '';

            currentQuestions.forEach((q, i) => {
                const userAns = answers[i] || [];
                const isCorrect = Array.isArray(q.correct) && 
                                  userAns.length === q.correct.length && 
                                  userAns.every(ans => q.correct.includes(ans));

                if (isCorrect) correctCount++;

                const userText = userAns.length > 0 ? userAns.map(idx => q.options[idx]).join(", ") : t('unanswered');
                const correctText = q.correct.map(idx => q.options[idx]).join(", ");

                reviewHTML += `
                    <div class="border rounded-2xl p-4 ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}">
                        <div class="font-medium mb-2">${cleanQuestionText(q.text)}</div>
                        <div class="text-sm">
                            <span class="font-semibold">${t('yourAnswer')}</span> ${userText}<br>
                            <span class="font-semibold">${t('correctAnswer')}</span> <span class="text-emerald-700">${correctText}</span>
                        </div>
                    </div>
                `;
            });

            const percent = Math.round((correctCount / currentQuestions.length) * 100);

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            document.getElementById('score-text').innerHTML = `${correctCount} <span class="text-4xl text-slate-400">/ ${currentQuestions.length}</span>`;
            document.getElementById('percentage-text').textContent = `${percent}%`;

            const badge = document.getElementById('result-badge');
            if (timeExpired) {
                badge.innerHTML = `<i class="fa-solid fa-clock mr-2"></i> ${t('timeExpiredBadge')}`;
                badge.className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-orange-100 text-orange-700";
            } else if (percent >= 75) {
                badge.innerHTML = `<i class="fa-solid fa-check-circle mr-2"></i> ${t('passedBadge')}`;
                badge.className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-emerald-100 text-emerald-700";
            } else {
                badge.innerHTML = `<i class="fa-solid fa-times-circle mr-2"></i> ${t('failedBadge')}`;
                badge.className = "inline-flex items-center gap-x-2 px-6 py-2 rounded-3xl text-sm font-semibold bg-red-100 text-red-700";
            }

            document.getElementById('review-section').innerHTML = reviewHTML;
        }

        function cancelQuiz() {
            if (confirm(t('confirmCancel'))) {
                clearInterval(timerInterval);
                restartApp();
            }
        }

        function restartApp() {
            document.getElementById('selection-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('warning-banner').classList.add('hidden');
            clearInterval(timerInterval);
            testTerminated = false;
        }

        window.onload = async function () {
            try {
                applyTranslations();
                await loadQuestions();
                console.log(t('questionsLoadedLog'), questionBank.length);
                enableAntiCheat();
